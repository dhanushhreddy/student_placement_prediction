<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREDICT - Student Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-bg">
        <div class="navbar">
            <div class="icon">
                <h2 class="logo">PREDICT<span>.AI</span></h2>
            </div>
            <div class="menu">
                <ul>
                    <li><a href="/">HOME</a></li>
                    <li><a href="/about">ABOUT</a></li>
                </ul>
            </div>
        </div> 

        <div class="container glass-card">
            <header>
                <h1>Student <span>Profile</span></h1>
                <p>Fill in your academic and professional details for an accurate prediction.</p>
            </header>

            <form action="{{ url_for('predict') }}" method="GET">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" placeholder="Enter your name" required>
                    </div>

                    <div class="form-group">
                        <label for="branch">Branch</label>
                        <select id="branch" name="branch" required>
                            <option value="" disabled selected>Select Branch</option>
                            <option>CSE</option>
                            <option>ISE</option>
                            <option>ECE</option>
                            <option>CSE-AI</option>
                            <option>MECH</option>
                            <option>CIVIL</option>
                            <option>CSE-DS</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="cgpa">Current CGPA</label>
                        <input type="number" id="cgpa" name="cgpa" min="0" max="10" step="0.01" placeholder="e.g. 8.5" required>
                    </div>

                    <div class="form-group">
                        <label for="skills">Key Skills</label>
                        <input type="text" id="skills" name="skills" placeholder="Python, ML, etc." required>
                    </div>

                    <div class="form-group">
                        <label for="internship">Internship Completed?</label>
                        <select id="internship" name="internship" required>
                            <option value="1">Yes</option>
                            <option value="0">No</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="hackathon">Hackathons</label>
                        <select id="hackathon" name="hackathon" required>
                            <option value="1">Participated</option>
                            <option value="0">Not yet</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="projects">Major Projects</label>
                        <input type="number" id="projects" name="projects" min="0" placeholder="Number of projects" required>
                    </div>

                    <div class="form-group">
                        <label for="communication_skills">Communication (1-10)</label>
                        <input type="number" id="communication_skills" name="communication_skills" min="1" max="10" step="0.1" placeholder="Rating" required>
                    </div>
                </div>

                <button type="submit" class="predict-btn">Generate Prediction</button>
            </form>
        </div>
    </div>
</body>
</html>
